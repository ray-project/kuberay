apiVersion: v1
kind: Pod
metadata:
  name: ray-head
  labels:
    app: ray
    component: head
spec:
  containers:
  - name: ray-head
    image: rayproject/ray:2.52.0
    command: ["/bin/bash", "-lc"]
    args:
    - |
      ulimit -n 65536; \
      ray start --head \
        --port=6379 \
        --dashboard-host=0.0.0.0 \
        --dashboard-agent-listen-port=52365 \
        --node-ip-address=$POD_IP \
        --num-cpus=1 \
        --block
    env:
    - name: POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    ports:
    - containerPort: 6379
      name: gcs-server
    - containerPort: 8265
      name: dashboard
    - containerPort: 10001
      name: client
    resources:
      requests:
        cpu: "1"
        memory: "5Gi"
      limits:
        cpu: "1"
        memory: "5Gi"
    volumeMounts:
    - name: dshm
      mountPath: /dev/shm
  volumes:
  - name: dshm
    emptyDir:
      medium: Memory
      sizeLimit: 5Gi
