apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: dashboard-only-cluster
  namespace: default
spec:
  rayVersion: '2.55.0'
  headGroupSpec:
    rayStartParams:
      dashboard-host: '0.0.0.0'
      # Wires `ray start --head --proxy-server-url=...` so the Ray Dashboard's
      # proxy middleware (ray-project/ray#61295) forwards UI traffic to the
      # history server.
      proxy-server-url: 'http://historyserver:30080'
    template:
      spec:
        containers:
        - name: ray-head
          image: rayproject/ray:2.55.0
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 8265
            name: dashboard
          - containerPort: 6379
            name: gcs
          resources:
            limits:
              cpu: "2"
              memory: 4G
            requests:
              cpu: "50m"
              memory: 1G
  workerGroupSpecs: []
