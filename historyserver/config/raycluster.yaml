apiVersion: ray.io/v1
kind: RayCluster
metadata:
  labels:
    ray.io/cluster: raycluster-historyserver
  name: raycluster-historyserver
  namespace: default
spec:
  headGroupSpec:
    rayStartParams:
      dashboard-host: 0.0.0.0
      num-cpus: "0"
    serviceType: ClusterIP
    template:
      metadata:
        labels:
          test: raycluster-historyserver
      spec:
        imagePullSecrets:
        affinity:
        containers:
        - env:
          - name: RAY_TMP_ROOT
            value: &rayTmpRoot /tmp/ray
          # Switch the event collection backend from the legacy Export API to Ray Event
          - name: RAY_enable_ray_event
            value: "true"
          # Whether to enable the ray event to send to the event aggregator
          # Currently, only task events are supported
          - name: RAY_enable_core_worker_ray_event_to_aggregator
            value: "true"
          # External HTTP endpoint the aggregator forwards events to
          # Pointed at the collector sidecar in this pod
          - name: RAY_DASHBOARD_AGGREGATOR_AGENT_EVENTS_EXPORT_ADDR
            value: "http://localhost:8084/v1/events"
          # Comma-separated list of event types that are allowed to be exposed to external HTTP services
          - name: RAY_DASHBOARD_AGGREGATOR_AGENT_EXPOSABLE_EVENT_TYPES
            value: "TASK_DEFINITION_EVENT,TASK_LIFECYCLE_EVENT,ACTOR_TASK_DEFINITION_EVENT,
                    TASK_PROFILE_EVENT,DRIVER_JOB_DEFINITION_EVENT,DRIVER_JOB_LIFECYCLE_EVENT,
                    ACTOR_DEFINITION_EVENT,ACTOR_LIFECYCLE_EVENT,NODE_DEFINITION_EVENT,NODE_LIFECYCLE_EVENT"
          image: rayproject/ray:2.55.0
          imagePullPolicy: IfNotPresent
          command:
          - 'echo "=========================================="; [ -d "$RAY_TMP_ROOT/session_latest" ] && dest="$RAY_TMP_ROOT/prev-logs/$(basename $(readlink "$RAY_TMP_ROOT/session_latest"))/$(cat "$RAY_TMP_ROOT/raylet_node_id")" && echo "dst is $dest" && mkdir -p "$dest" && mv "$RAY_TMP_ROOT/session_latest/logs" "$dest/logs"; echo "========================================="'
          securityContext:
            allowPrivilegeEscalation: true
            privileged: true
          name: ray-head
          lifecycle:
            postStart:
              exec:
                command:
                - /bin/sh
                - -lc
                - --
                - |
                  GetNodeId(){
                    while true;
                    do
                      nodeid=$(ps -ef | grep raylet | grep node_id | grep -v grep | grep -oP '(?<=--node_id=)[^ ]*')
                      if [ -n "$nodeid" ]; then
                        echo "$(date) raylet started: \"$(ps -ef | grep raylet | grep node_id | grep -v grep | grep -oP '(?<=--node_id=)[^ ]*')\" => ${nodeid}" >> "$RAY_TMP_ROOT/init.log"
                        echo $nodeid > "$RAY_TMP_ROOT/raylet_node_id"
                        break
                      else
                        echo "$(date) raylet not start >> $RAY_TMP_ROOT/init.log"
                        sleep 1
                      fi
                    done
                  }
                  GetNodeId
          resources:
            limits:
              cpu: "5"
              memory: 10G
            requests:
              cpu: "50m"
              memory: 1G
          volumeMounts:
          - name: historyserver
            mountPath: *rayTmpRoot
        - name: collector
          image: collector:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
          - name: RAY_TMP_ROOT
            value: *rayTmpRoot
          # RAY_DASHBOARD_ADDRESS is used by the head collector to fetch endpoints' results
          # (e.g., /api/v0/cluster_metadata) from the Ray Dashboard running in the same pod.
          # Only the head collector uses this; worker collectors do not need it.
          # If your Ray Dashboard uses a non-default port (not 8265), update this value accordingly.
          - name: RAY_DASHBOARD_ADDRESS
            value: "http://localhost:8265"
          # RAY_COLLECTOR_ADDITIONAL_ENDPOINTS is a comma-separated list of Ray Dashboard
          # API endpoint paths that the head collector will periodically poll and store.
          # Use this for endpoints whose data cannot be obtained via Ray events.
          # You can add more endpoints, e.g., "/api/v0/placement_groups,/api/serve/applications/"
          # Note: Only static endpoints (no dynamic path parameters like {job_id}) are supported.
          - name: RAY_COLLECTOR_ADDITIONAL_ENDPOINTS
            # Query params must match the Ray Dashboard frontend request exactly
            # (see https://github.com/ray-project/ray/blob/cb9c80fee6a700efe61ea97987248ce82e3fa2e2/python/ray/dashboard/client/src/service/placementGroup.ts):
            #   detail=1    — include bundles and stats fields required by PlacementGroupTable
            #   limit=10000 — match the frontend's default limit to avoid truncation
            value: "/api/v0/placement_groups?detail=1&limit=10000"
          # RAY_COLLECTOR_POLL_INTERVAL controls how often the collector polls the additional
          # endpoints above. Accepts Go duration format (e.g., "30s", "1m", "5m").
          - name: RAY_COLLECTOR_POLL_INTERVAL
            value: "30s"
          - name: S3DISABLE_SSL
            value: "true"
          - name: AWS_ACCESS_KEY_ID
            value: minioadmin
          - name: AWS_SECRET_ACCESS_KEY
            value: minioadmin
          - name: AWS_SESSION_TOKEN
            value: ""
          - name: S3_BUCKET
            value: "ray-historyserver"
          - name: S3_ENDPOINT
            value: "minio-service.minio-dev:9000"
          - name: S3_REGION
            value: "test"
          - name: S3FORCE_PATH_STYLE
            value: "true"
          command:
          - collector
          - --role=Head
          - --runtime-class-name=s3
          - --ray-cluster-name=raycluster-historyserver
          - --ray-root-dir=log
          - --events-port=8084
          volumeMounts:
          - name: historyserver
            mountPath: *rayTmpRoot
        tolerations:
        - key: ray
          operator: Equal
          value: cpu
        volumes:
        - name: historyserver
          emptyDir: {}
  workerGroupSpecs:
  - groupName: cpu
    maxReplicas: 1000
    minReplicas: 1
    numOfHosts: 1
    rayStartParams: {}
    replicas: 1
    template:
      metadata:
        labels:
          test: raycluster-historyserver
      spec:
        imagePullSecrets:
        containers:
        - env:
          - name: RAY_TMP_ROOT
            value: *rayTmpRoot
          # Switch the event collection backend from the legacy Export API to Ray Event.
          - name: RAY_enable_ray_event
            value: "true"
          # Whether to enable the ray event to send to the event aggregator.
          # Currently, only task events are supported.
          - name: RAY_enable_core_worker_ray_event_to_aggregator
            value: "true"
          # External HTTP endpoint the aggregator forwards events to.
          # Pointed at the collector sidecar in this pod.
          - name: RAY_DASHBOARD_AGGREGATOR_AGENT_EVENTS_EXPORT_ADDR
            value: "http://localhost:8084/v1/events"
          # Comma-separated list of event types that are allowed to be exposed to external HTTP services
          - name: RAY_DASHBOARD_AGGREGATOR_AGENT_EXPOSABLE_EVENT_TYPES
            value: "TASK_DEFINITION_EVENT,TASK_LIFECYCLE_EVENT,ACTOR_TASK_DEFINITION_EVENT,
                    TASK_PROFILE_EVENT,DRIVER_JOB_DEFINITION_EVENT,DRIVER_JOB_LIFECYCLE_EVENT,
                    ACTOR_DEFINITION_EVENT,ACTOR_LIFECYCLE_EVENT,NODE_DEFINITION_EVENT,NODE_LIFECYCLE_EVENT"
          image: rayproject/ray:2.55.0
          command:
          - 'echo "=========================================="; [ -d "$RAY_TMP_ROOT/session_latest" ] && dest="$RAY_TMP_ROOT/prev-logs/$(basename $(readlink "$RAY_TMP_ROOT/session_latest"))/$(cat "$RAY_TMP_ROOT/raylet_node_id")" && echo "dst is $dest" && mkdir -p "$dest" && mv "$RAY_TMP_ROOT/session_latest/logs" "$dest/logs"; echo "========================================="'
          imagePullPolicy: IfNotPresent
          name: ray-worker
          securityContext:
            allowPrivilegeEscalation: true
            privileged: true
          lifecycle:
            postStart:
              exec:
                command:
                - /bin/sh
                - -lc
                - --
                - |
                  GetNodeId(){
                    while true;
                    do
                      nodeid=$(ps -ef | grep raylet | grep node_id | grep -v grep | grep -oP '(?<=--node_id=)[^ ]*')
                      if [ -n "$nodeid" ]; then
                        echo "$(date) raylet started: \"$(ps -ef | grep raylet | grep node_id | grep -v grep | grep -oP '(?<=--node_id=)[^ ]*')\" => ${nodeid}" >> "$RAY_TMP_ROOT/init.log"
                        echo $nodeid > "$RAY_TMP_ROOT/raylet_node_id"
                        break
                      else
                        echo "$(date) raylet not start >> $RAY_TMP_ROOT/init.log"
                        sleep 1
                      fi
                    done
                  }
                  GetNodeId
          resources:
            limits:
              cpu: "2"
              memory: 2G
            requests:
              cpu: "50m"
              memory: 1G
          volumeMounts:
          - name: historyserver
            mountPath: *rayTmpRoot
        - name: collector
          image: collector:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
          - name: RAY_TMP_ROOT
            value: *rayTmpRoot
          - name: AWS_ACCESS_KEY_ID
            value: minioadmin
          - name: AWS_SECRET_ACCESS_KEY
            value: minioadmin
          - name: AWS_SESSION_TOKEN
            value: ""
          - name: S3_BUCKET
            value: "ray-historyserver"
          - name: S3_ENDPOINT
            value: "minio-service.minio-dev:9000"
          - name: S3_REGION
            value: "test"
          - name: S3FORCE_PATH_STYLE
            value: "true"
          - name: S3DISABLE_SSL
            value: "true"
          command:
          - collector
          - --role=Worker
          - --runtime-class-name=s3
          - --ray-cluster-name=raycluster-historyserver
          - --ray-root-dir=log
          - --events-port=8084
          volumeMounts:
          - name: historyserver
            mountPath: *rayTmpRoot
        tolerations:
        - key: ray
          operator: Equal
          value: cpu
        volumes:
        - name: historyserver
          emptyDir: {}
