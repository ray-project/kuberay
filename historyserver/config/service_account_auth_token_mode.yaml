# Apply this file ONLY when useAuthTokenMode is enabled in the history server
# configuration. The history server reads a Secret whose name matches the
# RayCluster name to retrieve the Ray auth token.
#
# This Role is namespace-scoped to limit secret access to only the namespace
# where RayClusters run. Deploy with: kubectl apply -n <namespace> -f <file>
# If your RayClusters span multiple namespaces, apply this file once per
# target namespace.

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: raycluster-secret-reader
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: historyserver-secret-reader
subjects:
- kind: ServiceAccount
  name: historyserver
  namespace: default
roleRef:
  kind: Role
  name: raycluster-secret-reader
  apiGroup: rbac.authorization.k8s.io
