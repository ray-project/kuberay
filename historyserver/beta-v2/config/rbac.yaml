# RBAC for the History Server.
#
# Pipeline.isDead does RayCluster Get; the /clusters handler does List.
# `watch` is granted for future controller-pattern readiness.
#
# Resource names are suffixed `-beta-v2` to coexist with prior releases.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rayclusters-reader-beta-v2
rules:
- apiGroups: ["ray.io"]
  resources: ["rayclusters"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: historyserver-beta-v2
  namespace: default
subjects:
- kind: ServiceAccount
  name: historyserver-beta-v2
  namespace: default
roleRef:
  kind: ClusterRole
  name: rayclusters-reader-beta-v2
  apiGroup: rbac.authorization.k8s.io
