apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: agent-sandbox-code-execution-demo
  namespace: default
spec:
  entrypoint: python ray-operator/config/samples/agent-sandbox/sandboxed_code_execution.py

  runtimeEnvYAML: |
    pip:
      - k8s-agent-sandbox
    working_dir: "https://github.com/ray-project/kuberay/archive/master.zip"

  rayClusterSpec:
    headGroupSpec:
      rayStartParams:
        dashboard-host: 0.0.0.0
      template:
        spec:
          containers:
          - image: rayproject/ray:2.55.0
            name: ray-head
            ports:
            - containerPort: 6379
              name: gcs
            - containerPort: 8265
              name: dashboard
            - containerPort: 10001
              name: client
            resources:
              requests:
                cpu: "2"
                memory: "4Gi"
              limits:
                cpu: "2"
                memory: "4Gi"
            readinessProbe:
              httpGet:
                path: /api/gcs_healthz
                port: 8265
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 10
            livenessProbe:
              httpGet:
                path: /api/gcs_healthz
                port: 8265
              initialDelaySeconds: 15
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 10
    workerGroupSpecs:
    - groupName: sandbox-executor-workers
      replicas: 2
      minReplicas: 1
      maxReplicas: 2
      rayStartParams: {}
      template:
        spec:
          containers:
          - image: rayproject/ray:2.49.0-py310
            name: ray-worker
            resources:
              requests:
                cpu: "1"
                memory: "2Gi"
              limits:
                cpu: "1"
                memory: "2Gi"
