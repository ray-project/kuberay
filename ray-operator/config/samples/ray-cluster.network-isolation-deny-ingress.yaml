apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: raycluster-deny-ingress
spec:
  networkIsolation:
    # Restricts all inbound traffic except intra-cluster and KubeRay operator.
    # Outbound traffic (egress) is unrestricted — pods can reach external services.
    mode: denyAllIngress
    ingressRules:
    # Allow pods labelled app=ray-client to reach the Ray Serve inference endpoint.
    # The base rules only open dashboard (8265) and client (10001) ports, so
    # an explicit rule is needed for serve traffic to reach the cluster.
    - from:
      - podSelector:
          matchLabels:
            app: ray-client
      ports:
      - port: 8000
        protocol: TCP
  rayVersion: '2.52.0'
  headGroupSpec:
    rayStartParams: {}
    template:
      spec:
        containers:
        - name: ray-head
          image: rayproject/ray:2.52.0
          resources:
            limits:
              cpu: "1"
              memory: "5Gi"
            requests:
              cpu: "1"
              memory: "2Gi"
          ports:
          - containerPort: 6379
            name: gcs-server
          - containerPort: 8265
            name: dashboard
          - containerPort: 10001
            name: client
          - containerPort: 8000
            name: serve
  workerGroupSpecs:
  - replicas: 1
    minReplicas: 1
    maxReplicas: 5
    groupName: workergroup
    rayStartParams: {}
    template:
      spec:
        containers:
        - name: ray-worker
          image: rayproject/ray:2.52.0
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
            requests:
              cpu: "1"
              memory: "1Gi"
