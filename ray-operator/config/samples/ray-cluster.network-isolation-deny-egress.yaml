apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: raycluster-deny-egress
spec:
  networkIsolation:
    # Restricts all outbound traffic except intra-cluster communication and DNS.
    # Inbound traffic (ingress) is unrestricted.
    # NOTE: pip install, RayJob submission to external endpoints, and RayServe
    # all require explicit egressRules to function.
    mode: denyAllEgress
    egressRules:
    # Allow pip install / PyPI access over HTTPS
    - to:
      - ipBlock:
          cidr: 0.0.0.0/0
      ports:
      - port: 443
        protocol: TCP
    # Allow RayJob submitter pods to reach the head dashboard port for job submission
    - to:
      - podSelector:
          matchLabels:
            ray.io/node-type: head
      ports:
      - port: 8265
        protocol: TCP
    # Allow RayServe traffic to leave worker pods on the default serve port
    - to:
      - podSelector: {}
      ports:
      - port: 8000
        protocol: TCP
  rayVersion: '2.52.0'
  headGroupSpec:
    rayStartParams: {}
    template:
      spec:
        containers:
        - name: ray-head
          image: rayproject/ray:2.52.0
          resources:
            limits:
              cpu: "1"
              memory: "5Gi"
            requests:
              cpu: "1"
              memory: "2Gi"
          ports:
          - containerPort: 6379
            name: gcs-server
          - containerPort: 8265
            name: dashboard
          - containerPort: 10001
            name: client
          - containerPort: 8000
            name: serve
  workerGroupSpecs:
  - replicas: 1
    minReplicas: 1
    maxReplicas: 5
    groupName: workergroup
    rayStartParams: {}
    template:
      spec:
        containers:
        - name: ray-worker
          image: rayproject/ray:2.52.0
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
            requests:
              cpu: "1"
              memory: "1Gi"
