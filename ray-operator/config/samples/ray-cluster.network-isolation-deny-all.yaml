apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: raycluster-deny-all
spec:
  networkIsolation:
    mode: denyAll
    ingressRules:
    # Allow Prometheus to scrape metrics from the metrics port
    - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: prometheus
      ports:
      - port: 8080
        protocol: TCP
    egressRules:
    # Allow pip install / PyPI access over HTTPS
    - to:
      - ipBlock:
          cidr: 0.0.0.0/0
      ports:
      - port: 443
        protocol: TCP
  rayVersion: '2.52.0'
  headGroupSpec:
    rayStartParams: {}
    template:
      spec:
        containers:
        - name: ray-head
          image: rayproject/ray:2.52.0
          resources:
            limits:
              cpu: "1"
              memory: "5Gi"
            requests:
              cpu: "1"
              memory: "2Gi"
          ports:
          - containerPort: 6379
            name: gcs-server
          - containerPort: 8265
            name: dashboard
          - containerPort: 10001
            name: client
          - containerPort: 8080
            name: metrics
  workerGroupSpecs:
  - replicas: 1
    minReplicas: 1
    maxReplicas: 5
    groupName: workergroup
    rayStartParams: {}
    template:
      spec:
        containers:
        - name: ray-worker
          image: rayproject/ray:2.52.0
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
            requests:
              cpu: "1"
              memory: "1Gi"
