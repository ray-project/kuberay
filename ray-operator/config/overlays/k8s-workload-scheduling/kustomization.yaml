## ============================================================================
## Kustomize overlay: k8s-workload-scheduling (local dev / CI e2e only)
## ----------------------------------------------------------------------------
## Purpose: Deploy the operator with the K8sWorkloadScheduling feature gate
## enabled, on top of the standard test-overrides overlay.
## Requires Kubernetes 1.36+ with GenericWorkload and GangScheduling enabled.
## ============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../test-overrides

patches:
  - path: deployment-override.yaml
    target:
      kind: Deployment
      name: kuberay-operator
