kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  apiServerAddress: "127.0.0.1"
  # Ensure stable port so we can rewrite the server address later
  apiServerPort: 6443
# Adding this so containers from the same docker network can access it
# https://blog.scottlowe.org/2019/07/30/adding-a-name-to-kubernetes-api-server-certificate/
nodes:
- role: control-plane
  # No pre-built kindest/node:v1.36.0-beta.0 images exist yet.
  # Build locally: kind build node-image --image kindest/node:v1.36.0-beta.0 v1.36.0-beta.0
  # Update this image tag to match whichever version is built.
  image: kindest/node:v1.36.0-beta.0
  kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        feature-gates: "GenericWorkload=true"
        runtime-config: "scheduling.k8s.io/v1alpha2=true"
      certSANs:
        - "127.0.0.1"
        - "docker"
    controllerManager:
      extraArgs:
        feature-gates: "GenericWorkload=true"
    scheduler:
      extraArgs:
        feature-gates: "GenericWorkload=true,GangScheduling=true"
